<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forest.io</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial;}
canvas{display:block;margin:0 auto;}
#menu{
    position:absolute;inset:0;background:radial-gradient(circle at top,#254d25,#081208 70%);
    display:flex;justify-content:center;align-items:center;z-index:9999;
}
#menuBox{
    width:420px;background:rgba(0,0,0,0.85);border:4px solid #4caf50;
    border-radius:20px;padding:40px;text-align:center;color:white;
}
#menuBox h1{font-size:58px;margin:0;color:#7dff7d;}
#menuBox button{
    width:100%;padding:18px;margin-top:15px;font-size:22px;border:none;
    border-radius:12px;background:linear-gradient(#59d659,#2f8f2f);color:white;cursor:pointer;
}
#roomCode{font-size:34px;color:#ffe082;letter-spacing:5px;margin:10px 0;}
#joinInput{width:100%;box-sizing:border-box;padding:15px;border:none;border-radius:10px;
    margin-top:10px;background:#111;color:white;font-size:20px;text-align:center;}
#ui{
    position:absolute;top:10px;left:10px;color:white;font-size:18px;
    text-shadow:2px 2px 4px #000;z-index:10;
}
#leaderboard{
    position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.7);
    padding:10px;border-radius:10px;color:white;font-size:15px;z-index:10;
    min-width:180px;
}
#levelUp{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.95);padding:25px;border:5px solid #4caf50;
    border-radius:15px;color:white;text-align:center;display:none;z-index:100;
}
#info{position:absolute;bottom:10px;left:10px;color:#aaa;font-size:13px;}
</style>
</head>
<body>

<div id="menu">
    <div id="menuBox">
        <h1>🌲 Forest.io</h1>
        <button onclick="playSolo()">Play Solo</button>
        <button onclick="showRoomMenu()">Make Room</button>
        <div id="roomMenu" style="display:none;">
            <p>Your Room Code:</p>
            <div id="roomCode">AAAAAA</div>
            <input id="joinInput" placeholder="Enter Room Code">
            <button onclick="joinRoom()">Join Room</button>
        </div>
    </div>
</div>

<div id="ui">
    Level: <span id="level">1</span> | 
    XP: <span id="xp">0</span>/<span id="xpMax">120</span><br>
    Health: <span id="health">100</span> | 
    Weapon: <span id="weapon">Fists</span>
</div>

<div id="leaderboard" style="display:none;">
    <strong>🏆 Leaderboard</strong><br>
    <div id="lbContent"></div>
</div>

<div id="levelUp">
    <h2>🎉 Level Up! Choose Weapon</h2>
    <button onclick="chooseWeapon('dagger')">Dagger</button>
    <button onclick="chooseWeapon('sword')">Sword</button>
</div>

<canvas id="game" width="1280" height="720"></canvas>

<div id="info">
    WASD / Arrows = Move • Mouse = Aim & Hold to gather
</div>

<script>
// ====================== GAME VARIABLES ======================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let gameStarted = false;

const player = {
    x: 0, y: 0,
    speed: 4.2,
    angle: 0,
    health: 100,
    level: 1,
    xp: 0,
    xpToNext: 120,
    weapon: "fists",
    damage: 12,
    attackSpeed: 650
};

let camera = {x:0, y:0};
let keys = {};
let mouse = {x:W/2, y:H/2, down:false};
let resources = [];
let logs = [];
let particles = [];
let lastAttack = 0;

// Map boundaries (Finite world)
const WORLD_SIZE = 2000;
const WORLD_MIN = -WORLD_SIZE;
const WORLD_MAX = WORLD_SIZE;

// **New Player Sprite**
const playerImg = new Image();
playerImg.src = "https://static.wikia.nocookie.net/tamingio/images/3/39/Site-community-image/revision/latest?cb=20220707212701";

const images = {
    tree: new Image(),
    stone: new Image(),
    log: new Image(),
    dagger: new Image(),
    sword: new Image()
};

function loadImage(img, src) {
    img.crossOrigin = "Anonymous";
    img.src = src;
}

loadImage(images.tree, "https://static.wikia.nocookie.net/tamingio/images/7/7e/Tree1.png/revision/latest?cb=20210908000708");
loadImage(images.stone, "https://static.wikia.nocookie.net/tamingio/images/f/fb/Stone5.png/revision/latest/scale-to-width/360?cb=20230917210259");
loadImage(images.log, "https://files.catbox.moe/s5f0rb.png");
loadImage(images.dagger, "https://static.wikia.nocookie.net/tamingio/images/2/26/Diamond-daggers.png/revision/latest?cb=20220707171320");
loadImage(images.sword, "https://static.wikia.nocookie.net/tamingio/images/0/00/Diamond-sword.png/revision/latest/scale-to-width-down/250?cb=20220707150943");

// Leaderboard
let playersInRoom = [{name: "You", level: 1, xp: 0}];

function updateLeaderboard() {
    const lb = document.getElementById('lbContent');
    const sorted = [...playersInRoom].sort((a,b) => b.level - a.level || b.xp - a.xp);
    let html = '';
    sorted.forEach((p,i) => {
        html += `${i+1}. ${p.name} — Lv.${p.level}<br>`;
    });
    lb.innerHTML = html;
}

function generateMap() {
    resources = [];
    logs = [];
    for(let i=0;i<55;i++){
        resources.push({type:"tree", x:Math.random()*WORLD_MAX*2 + WORLD_MIN, y:Math.random()*WORLD_MAX*2 + WORLD_MIN, hp:90, maxHp:90});
    }
    for(let i=0;i<35;i++){
        resources.push({type:"stone", x:Math.random()*WORLD_MAX*2 + WORLD_MIN, y:Math.random()*WORLD_MAX*2 + WORLD_MIN, hp:140, maxHp:140});
    }
    for(let i=0;i<22;i++){
        logs.push({x:Math.random()*WORLD_MAX*2 + WORLD_MIN, y:Math.random()*WORLD_MAX*2 + WORLD_MIN, value:25});
    }
}

function clampPosition() {
    player.x = Math.max(WORLD_MIN + 60, Math.min(WORLD_MAX - 60, player.x));
    player.y = Math.max(WORLD_MIN + 60, Math.min(WORLD_MAX - 60, player.y));
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function createParticles(x, y, color, count) {
    for(let i=0;i<count;i++){
        particles.push({
            x, y,
            vx: Math.random()*8-4,
            vy: Math.random()*8-4,
            life: 35,
            color
        });
    }
}

function loop() {
    // Movement
    let dx = 0, dy = 0;
    if(keys['w'] || keys['arrowup']) dy -= 1;
    if(keys['s'] || keys['arrowdown']) dy += 1;
    if(keys['a'] || keys['arrowleft']) dx -= 1;
    if(keys['d'] || keys['arrowright']) dx += 1;

    if(dx || dy){
        const len = Math.hypot(dx, dy) || 1;
        player.x += (dx/len) * player.speed;
        player.y += (dy/len) * player.speed;
    }

    clampPosition();

    camera.x += (player.x - camera.x) * 0.09;
    camera.y += (player.y - camera.y) * 0.09;

    player.angle = Math.atan2(mouse.y - H/2, mouse.x - W/2);

    // Gathering
    if(mouse.down && Date.now() - lastAttack > player.attackSpeed){
        lastAttack = Date.now();

        for(let i = resources.length-1; i >= 0; i--){
            const r = resources[i];
            if(dist(player, r) < 75){
                r.hp -= player.damage;
                createParticles(r.x, r.y, "#fff", 6);
                if(r.hp <= 0){
                    player.xp += r.type === "tree" ? 26 : 38;
                    resources.splice(i, 1);
                }
                break;
            }
        }

        for(let i = logs.length-1; i >= 0; i--){
            if(dist(player, logs[i]) < 65){
                player.xp += logs[i].value;
                createParticles(logs[i].x, logs[i].y, "#ffeb3b", 18);
                logs.splice(i, 1);
                break;
            }
        }
    }

    // Level up
    if(player.xp >= player.xpToNext){
        player.level++;
        player.xp = 0;
        player.xpToNext = Math.floor(player.xpToNext * 1.72);
        if(player.level === 2) document.getElementById('levelUp').style.display = 'block';
        player.health = Math.min(100, player.health + 35);
    }

    // Update leaderboard
    playersInRoom[0].level = player.level;
    playersInRoom[0].xp = player.xp;
    updateLeaderboard();

    // === RENDERING ===
    ctx.fillStyle = "#284d1d";
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = "#315927";
    ctx.lineWidth = 3;
    for(let x = (-camera.x % 80) - 40; x < W; x += 80){
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for(let y = (-camera.y % 80) - 40; y < H; y += 80){
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Resources
    for(let r of resources){
        const sx = r.x - camera.x + W/2;
        const sy = r.y - camera.y + H/2;
        if(r.type === "tree"){
            ctx.drawImage(images.tree, sx-70, sy-95, 140, 160);
        } else {
            ctx.drawImage(images.stone, sx-45, sy-45, 90, 90);
        }
        if(r.hp < r.maxHp){
            const ratio = r.hp / r.maxHp;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(sx-28, sy-65, 56, 8);
            ctx.fillStyle = "#4caf50";
            ctx.fillRect(sx-28, sy-65, 56*ratio, 8);
        }
    }

    // Logs
    for(let l of logs){
        const sx = l.x - camera.x + W/2;
        const sy = l.y - camera.y + H/2;
        ctx.drawImage(images.log, sx-35, sy-25, 70, 50);
    }

    // === PLAYER ===
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.rotate(player.angle + Math.PI/2); // Adjust rotation so character faces mouse correctly
    ctx.drawImage(playerImg, -38, -38, 76, 76);
    ctx.restore();

    // Particles
    for(let i = particles.length-1; i >= 0; i--){
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        ctx.globalAlpha = p.life / 35;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camera.x + W/2 - 3, p.y - camera.y + H/2 - 3, 6, 6);
        if(p.life <= 0) particles.splice(i,1);
    }
    ctx.globalAlpha = 1;

    // UI Update
    document.getElementById('level').textContent = player.level;
    document.getElementById('xp').textContent = Math.floor(player.xp);
    document.getElementById('xpMax').textContent = player.xpToNext;
    document.getElementById('health').textContent = Math.floor(player.health);
}

// ====================== MENU ======================
function playSolo(){
    document.getElementById("menu").style.display = "none";
    document.getElementById("leaderboard").style.display = "block";
    gameStarted = true;
    generateMap();
}

function showRoomMenu(){
    document.getElementById("roomMenu").style.display = "block";
    document.getElementById("roomCode").textContent = generateRoomCode();
}

function joinRoom(){
    const code = document.getElementById("joinInput").value.trim().toUpperCase();
    if(code.length < 4) return alert("Invalid Room Code");
    document.getElementById("menu").style.display = "none";
    document.getElementById("leaderboard").style.display = "block";
    gameStarted = true;
    generateMap();
    alert("Joined room: " + code);
}

function generateRoomCode(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";
    let code = "";
    for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
    return code;
}

window.chooseWeapon = function(type){
    player.weapon = type;
    player.damage = type === "dagger" ? 18 : 35;
    player.attackSpeed = type === "dagger" ? 360 : 580;
    document.getElementById('levelUp').style.display = 'none';
    document.getElementById('weapon').textContent = type === "dagger" ? "Dagger" : "Sword";
};

// Input
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);

function gameLoop(){
    if(gameStarted) loop();
    requestAnimationFrame(gameLoop);
}

generateMap();
gameLoop();
</script>
</body>
</html>

